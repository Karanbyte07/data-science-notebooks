<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jinja2</title>
</head>

<body>
    <h1>Hello my name is {{ name }} and I am learning {{ lang }}</h1>


    <!-- write a loop in jinja 2 using for loop -->

    {% for i in range(5) %}
    <li>The value of i is {{ i }}</li>
    {% endfor %}
</body>

</html>
